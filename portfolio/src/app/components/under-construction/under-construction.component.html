<section class="construction-page">
  <!-- Canvas background + crane animation -->
  <canvas #constructionCanvas class="construction-canvas"></canvas>

  <!-- Main content -->
  <div class="content-container">
    <!-- Status badge -->
    <div class="status-badge">
      <span class="status-pulse"></span>
      {{ 'underConstruction.status' | translate }}
    </div>

    <!-- Title & subtitle -->
    <h1 class="construction-title">{{ 'underConstruction.title' | translate }}</h1>
    <p class="construction-subtitle">{{ 'underConstruction.subtitle' | translate }}</p>

    <!-- Action buttons -->
    <div class="actions">
      <a routerLink="/" class="btn-primary">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        {{ 'underConstruction.goHome' | translate }}
      </a>
      <a routerLink="/contact" class="btn-secondary">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
          <polyline points="22,6 12,13 2,6"></polyline>
        </svg>
        {{ 'underConstruction.contact' | translate }}
      </a>
    </div>
  </div>
</section>
